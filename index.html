<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZHAFEER26 – Kerajaan Angkatan 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* =========================================
       1. RESET & GLOBAL STYLES
       ========================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #000;
      font-family: 'Exo 2', sans-serif;
      color: #E0F7FA;
      position: relative;
      /* Mencegah scroll samping, tapi membolehkan scroll bawah jika layar kecil */
      overflow-x: hidden; 
    }

    /* =========================================
       2. BACKGROUND EFFECTS
       ========================================= */
    /* Grid Pattern Background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        linear-gradient(rgba(33, 230, 193, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(33, 230, 193, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 1;
    }

    /* Background Logo Image */
    .logo-z-bg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 92vmin;
      max-width: 1000px;
      opacity: 0.4;
      z-index: 2;
      pointer-events: none;
      filter: drop-shadow(0 0 80px #21E6C1) 
              drop-shadow(0 0 160px #6A0DAD) 
              drop-shadow(0 0 300px #BA55D3);
      animation: neonBreath 6s infinite alternate ease-in-out;
    }

    /* =========================================
       3. LAYOUT CONTAINER
       ========================================= */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 10vh 2rem 8vh;
    }

    /* =========================================
       4. TYPOGRAPHY
       ========================================= */
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 900;
      letter-spacing: 20px;
      color: transparent;
      background: linear-gradient(135deg, #21E6C1, #BA55D3);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 60px #21E6C1;
      margin-bottom: 1rem;
    }

    .year {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(9rem, 28vw, 24rem);
      font-weight: 900;
      letter-spacing: 12px;
      line-height: 0.9;
      margin: 2rem 0 4rem;
      
      /* Gradient Text Logic */
      background: linear-gradient(135deg, #e0f7fa, #21E6C1 40%, #6A0DAD 80%, #BA55D3);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      
      /* Text Stroke */
   
      -webkit-text-stroke: 4px #000;
      
      filter: drop-shadow(0 20px 40px #000) drop-shadow(0 0 120px #21E6C1);
    }

    .tagline {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      color: #b0e0e6;
      margin: 3rem 0 5rem;
      font-weight: 300;
      letter-spacing: 6px;
      text-shadow: 0 0 40px #21E6C1;
      line-height: 1.4;
    }

    /* =========================================
       5. COMPONENTS (BUTTONS & SOCIAL)
       ========================================= */
    /* Tombol Utama */
    .btn-royal {
      position: relative;
      background: linear-gradient(45deg, #1B263B, #21E6C1, #6A0DAD);
      color: #fff;
      padding: 20px 100px;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 4px;
      border-radius: 50px;
      border: 3px solid #21E6C1;
      box-shadow: 0 30px 80px rgba(33, 230, 193, 0.6);
      text-decoration: none;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      overflow: hidden;
      display: inline-block;
    }

    /* Efek Kilau pada Hover Tombol */
    .btn-royal::before {
      content: '';
      position: absolute;
      top: 0; 
      left: -100%;
      width: 100%; 
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.7s;
    }

    .btn-royal:hover::before {
      left: 100%;
    }

    .btn-royal:hover {
      transform: translateY(-18px) scale(1.08);
      box-shadow: 0 60px 120px rgba(186, 85, 211, 0.9);
      background: linear-gradient(45deg, #21E6C1, #BA55D3);
    }

    /* Social Media Links */
    .social {
      margin-top: 2rem;
    }

    .social a {
      color: #21E6C1;
      font-size: 4rem;
      margin: 0 25px;
      transition: all 0.5s ease;
      filter: drop-shadow(0 0 20px #21E6C1);
      display: inline-block;
    }

    .social a:hover {
      color: #BA55D3;
      transform: translateY(-15px) scale(1.4);
      filter: drop-shadow(0 0 50px #BA55D3);
    }

    /* =========================================
       6. FOOTER
       ========================================= */
    footer {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1rem, 4vw, 1.6rem);
      color: #555;
      letter-spacing: 5px;
      z-index: 10;
      text-shadow: 0 0 20px #21E6C1;
      white-space: nowrap;
    }

    /* =========================================
       7. ANIMATIONS
       ========================================= */
    @keyframes neonBreath {
      0%   { filter: drop-shadow(0 0 80px #21E6C1); }
      100% { filter: drop-shadow(0 0 120px #21E6C1) drop-shadow(0 0 280px #BA55D3); }
    }
  </style>
</head>
<body>

  <img src="img/logo zhaferr.png" alt="Zhafeer Logo Background" class="logo-z-bg">

  <div class="container">
    <h1>WELCOME TO</h1>
    
    <div class="year"><h1>ZHAFEER26</h1></div>
    
     <div style="text-align:center; margin-top: 4rem;" class="fade-up">
                <a href="beranda.html" class="btn-royal">
                    MASUK
                </a>
            </div>
    <p class="tagline">
      Bagai Ikatan Keluarga<br>
      bukan hanya sekedar saudara
    </p>
    

   
    <div class="social">
      <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="#" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
      <a href="#" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
    </div>
  </div>

  <footer>DuaEnamTanpaDendam</footer>

</body>
</html>
