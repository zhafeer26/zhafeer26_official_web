<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ZHAFEER26 | Galeri</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --cyan: #21E6C1;
      --purple: #BA55D3;
      --deep-purple: #6A0DAD;
      --dark: #060a10;
      --text: #E0F7FA;
      --text-muted: rgba(176,224,230,0.65);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family:'Rajdhani',sans-serif;
      background:var(--dark);
      color:var(--text);
      overflow-x:hidden;
      min-height:100vh;
    }

    /* ── BACKGROUND ── */
    .grid-overlay {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(33,230,193,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(33,230,193,0.03) 1px, transparent 1px);
      background-size:40px 40px;
    }
    .scanline {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background:repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    }
    .logo-bg {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:min(80vw,420px);
      opacity:0.08; z-index:1; pointer-events:none;
      filter:drop-shadow(0 0 60px var(--cyan));
      animation:breathe 6s ease-in-out infinite alternate;
    }
    @keyframes breathe {
      0%   { opacity:0.05; filter:drop-shadow(0 0 40px var(--cyan)); }
      100% { opacity:0.12; filter:drop-shadow(0 0 90px var(--cyan)) drop-shadow(0 0 180px var(--purple)); }
    }

    /* ── NAVBAR ── */
    .navbar {
      position:fixed; top:0; left:0; right:0;
      background:rgba(6,10,16,0.92);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      z-index:1000;
      border-bottom:1px solid rgba(33,230,193,0.15);
    }
    .nav-inner {
      max-width:1200px; margin:0 auto; padding:0 20px;
      height:62px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .nav-logo {
      display:flex; align-items:center; gap:10px;
      font-family:'Orbitron',sans-serif;
      font-size:clamp(1rem,4vw,1.35rem);
      font-weight:900; color:var(--cyan);
      text-shadow:0 0 12px var(--cyan);
      text-decoration:none;
    }
    .nav-logo img {
      width:36px; height:36px; border-radius:50%;
      border:1.5px solid rgba(33,230,193,0.5);
      box-shadow:0 0 10px rgba(33,230,193,0.4);
      object-fit:cover;
    }

    .hamburger {
      display:none; flex-direction:column; gap:5px;
      cursor:pointer; padding:6px; z-index:1100;
      background:none; border:none;
    }
    .hamburger span {
      display:block; width:24px; height:2px;
      background:var(--cyan); border-radius:2px;
      transition:all 0.3s ease;
      box-shadow:0 0 6px var(--cyan);
    }
    .hamburger.open span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2){ opacity:0; transform:scaleX(0); }
    .hamburger.open span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

    .nav-menu { display:flex; gap:28px; list-style:none; }
    .nav-link {
      color:var(--text-muted); text-decoration:none;
      font-family:'Rajdhani',sans-serif;
      font-weight:600; font-size:1rem; letter-spacing:1px;
      position:relative; transition:color 0.3s; padding:4px 0;
    }
    .nav-link::after {
      content:''; position:absolute; bottom:-2px; left:0;
      width:0; height:1.5px;
      background:linear-gradient(90deg,var(--cyan),var(--purple));
      transition:width 0.35s ease;
    }
    .nav-link:hover,.nav-link.active { color:var(--cyan); }
    .nav-link:hover::after,.nav-link.active::after { width:100%; }

    .nav-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(6,10,16,0.5); z-index:900;
    }
    .nav-overlay.show { display:block; }

    @media(max-width:768px){
      .hamburger { display:flex; }
      .nav-menu {
        position:fixed; top:0; right:-100%; bottom:0; margin-top: 3cm;
        width:min(75vw,280px);
        background:rgba(6,10,16,0.98);
        border-left:1px solid rgba(33,230,193,0.15);
        flex-direction:column; justify-content:center;
        align-items:center; gap:32px;
        z-index:1050;
        transition:right 0.35s cubic-bezier(0.23,1,0.32,1);
        padding:40px 20px;
      }
      .nav-menu.open { right:0; }
      .nav-link { font-size:1.25rem; }
    }

    /* ── PAGE ── */
    .page { position:relative; z-index:10; padding-top:62px; }

    /* ── HERO ── */
    .hero {
      text-align:center;
      padding:clamp(52px,10vw,90px) 20px clamp(32px,6vw,56px);
    }
    .hero-label {
      display:inline-flex; align-items:center; gap:8px;
      background:rgba(33,230,193,0.07);
      border:1px solid rgba(33,230,193,0.2);
      border-radius:20px; padding:5px 16px;
      font-family:'Orbitron',sans-serif;
      font-size:clamp(0.55rem,2vw,0.7rem);
      letter-spacing:2px; color:rgba(33,230,193,0.7);
      margin-bottom:16px;
      opacity:0; animation:fadeUp 0.7s ease forwards 0.2s;
    }
    .pulse-dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--cyan); box-shadow:0 0 8px var(--cyan);
      animation:pulseDot 1.8s ease-in-out infinite;
    }
    @keyframes pulseDot {
      0%,100%{ transform:scale(1); opacity:1; }
      50%{ transform:scale(0.6); opacity:0.4; }
    }
    .hero h1 {
      font-family:'Orbitron',sans-serif;
      font-size:clamp(2.4rem,12vw,7rem);
      font-weight:900;
      letter-spacing:clamp(4px,3vw,14px);
      background:linear-gradient(135deg,#e0f7fa 0%,var(--cyan) 40%,var(--deep-purple) 75%,var(--purple) 100%);
      -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent;
      filter:drop-shadow(0 0 30px rgba(33,230,193,0.4));
      line-height:1.1; margin-bottom:14px;
      opacity:0; animation:fadeUp 0.9s ease forwards 0.4s;
    }
    .hero-quote {
      font-size:clamp(0.88rem,3vw,1.1rem);
      font-weight:300; font-style:italic;
      color:var(--text-muted);
      letter-spacing:1px;
      max-width:560px; margin:0 auto;
      line-height:1.7;
      opacity:0; animation:fadeUp 0.9s ease forwards 0.6s;
    }
    .hero-quote em { color:rgba(33,230,193,0.7); font-style:normal; }

    /* ── GALLERY GRID ── */
    .gallery-wrap {
      padding:0 20px clamp(60px,10vw,100px);
      max-width:1100px; margin:0 auto;
    }

    .gallery-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(min(100%,280px),1fr));
      gap:clamp(14px,3vw,24px);
    }

    /* Card */
    .gallery-card {
      display:block;
      text-decoration:none;
      position:relative;
      border-radius:14px;
      overflow:hidden;
      background:linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,27,75,0.8));
      border:1px solid rgba(33,230,193,0.15);
      box-shadow:0 8px 32px rgba(0,0,0,0.55);
      aspect-ratio:4/3;
      transition:transform 0.4s cubic-bezier(0.23,1,0.32,1),
                 box-shadow 0.4s ease,
                 border-color 0.4s ease;
      cursor:pointer;
    }

    /* Top accent line */
    .gallery-card::before {
      content:''; position:absolute; top:0; left:0; right:0;
      height:2px; z-index:4;
      background:linear-gradient(90deg,transparent,var(--cyan),transparent);
      opacity:0; transition:opacity 0.4s;
    }

    /* Inner glow on hover */
    .gallery-card::after {
      content:''; position:absolute; inset:0; z-index:3;
      background:linear-gradient(135deg,rgba(33,230,193,0.06),rgba(186,85,211,0.06));
      opacity:0; transition:opacity 0.4s;
      border-radius:14px;
    }

    .gallery-card:hover {
      transform:translateY(-8px) scale(1.02);
      box-shadow:0 24px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(33,230,193,0.3);
      border-color:rgba(33,230,193,0.35);
    }
    .gallery-card:hover::before { opacity:1; }
    .gallery-card:hover::after  { opacity:1; }

    .gallery-card:active { transform:translateY(-2px) scale(0.99); }

    /* Image */
    .card-img {
      width:100%; height:100%;
      object-fit:cover;
      transition:transform 0.7s cubic-bezier(0.23,1,0.32,1);
      display:block;
    }
    .card-img.contain {
      object-fit:contain;
      padding:16px;
      background:rgba(6,10,16,0.7);
    }
    .gallery-card:hover .card-img { transform:scale(1.08); }

    /* Gradient overlay */
    .card-overlay {
      position:absolute; inset:0; z-index:2;
      background:linear-gradient(to bottom,
        transparent 30%,
        rgba(6,10,16,0.5) 65%,
        rgba(6,10,16,0.92) 100%);
    }

    /* Card info (always visible at bottom) */
    .card-info {
      position:absolute; bottom:0; left:0; right:0;
      z-index:3;
      padding:clamp(14px,3vw,22px) clamp(14px,3vw,20px);
    }
    .card-title {
      font-family:'Orbitron',sans-serif;
      font-size:clamp(0.78rem,3vw,1rem);
      font-weight:700; color:#fff;
      letter-spacing:2px;
      text-shadow:0 2px 8px rgba(0,0,0,0.7);
      margin-bottom:4px;
    }
    .card-sub {
      font-size:clamp(0.7rem,2.5vw,0.82rem);
      color:rgba(33,230,193,0.65);
      letter-spacing:1px;
    }

    /* Arrow icon */
    .card-arrow {
      position:absolute; top:14px; right:14px;
      z-index:3;
      width:32px; height:32px;
      border-radius:50%;
      background:rgba(33,230,193,0.1);
      border:1px solid rgba(33,230,193,0.25);
      display:flex; align-items:center; justify-content:center;
      color:rgba(33,230,193,0.7);
      font-size:0.7rem;
      transition:all 0.35s ease;
      opacity:0; transform:scale(0.8);
    }
    .gallery-card:hover .card-arrow {
      opacity:1; transform:scale(1);
      background:rgba(33,230,193,0.18);
      border-color:var(--cyan);
      color:var(--cyan);
    }

    /* ── EMPTY STATE ── */
    .empty-hint {
      text-align:center;
      padding:clamp(28px,6vw,48px) 20px;
      color:rgba(33,230,193,0.25);
      font-family:'Orbitron',sans-serif;
      font-size:clamp(0.6rem,2vw,0.75rem);
      letter-spacing:3px;
      border:1px dashed rgba(33,230,193,0.12);
      border-radius:12px;
    }

    /* ── SECTION DIVIDER ── */
    .divider {
      width:100%; height:1px;
      background:linear-gradient(90deg,transparent,rgba(33,230,193,0.15),rgba(186,85,211,0.15),transparent);
      margin-bottom:clamp(32px,5vw,52px);
    }

    /* ── FOOTER ── */
    footer {
      border-top:1px solid rgba(33,230,193,0.1);
      padding:clamp(20px,4vw,32px) 20px;
      text-align:center;
      background:rgba(6,10,16,0.95);
      position:relative; z-index:10;
    }
    .footer-brand {
      font-family:'Orbitron',sans-serif;
      font-size:clamp(0.85rem,3vw,1.1rem);
      font-weight:900; color:var(--cyan);
      text-shadow:0 0 12px var(--cyan);
      letter-spacing:3px; margin-bottom:8px;
    }
    .footer-tagline {
      font-size:clamp(0.6rem,2vw,0.75rem);
      letter-spacing:3px; color:rgba(33,230,193,0.3);
      font-family:'Orbitron',sans-serif;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from{ opacity:0; transform:translateY(18px); }
      to  { opacity:1; transform:translateY(0); }
    }
    .fu { opacity:0; transform:translateY(20px); transition:opacity 0.75s ease, transform 0.75s ease; }
    .fu.vis { opacity:1; transform:translateY(0); }

    @supports(padding-bottom:env(safe-area-inset-bottom)){
      footer{ padding-bottom:calc(20px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>

  <div class="grid-overlay"></div>
  <div class="scanline"></div>
  <img src="../img/logo zhaferr.png" alt="" class="logo-bg" onerror="this.style.display='none'">

  <div class="nav-overlay" id="navOverlay"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="beranda.html" class="nav-logo">
        <img src="../img/logo putih polos.png" alt="Logo" onerror="this.style.display='none'">
        ZHAFEER26
      </a>
      <button class="hamburger" id="hamburger" aria-label="Buka menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="beranda.html" class="nav-link">Beranda</a></li>
        <li><a href="about.html" class="nav-link">Tentang</a></li>
        <li><a href="gallery.html" class="nav-link active">Galeri</a></li>
        <li><a href="event.html" class="nav-link">Event</a></li>
      </ul>
    </div>
  </nav>

  <div class="page">

    <!-- Hero -->
    <section class="hero">
      <div class="hero-label">
        <span class="pulse-dot"></span>
        KOLEKSI KENANGAN
      </div>
      <h1>GALERI KITA</h1>
      <p class="hero-quote">
        "Bukan tentang berapa lama kita bersama,<br>
        tapi seberapa dalam <em>kita saling mengukir.</em>"
      </p>
    </section>

    <div class="divider"></div>

    <!-- Gallery -->
    <div class="gallery-wrap">
      <div class="gallery-grid" id="galleryGrid">

        <!-- Card: Zhafeer 26 -->
        <a href="zhafeer.html" class="gallery-card fu">
          <img src="../img/logo zhaferr.png" alt="Zhafeer 26" class="card-img contain">
          <div class="card-overlay"></div>
          <div class="card-info">
            <div class="card-title">Zhafeer 26</div>
            <div class="card-sub">Angkatan 2026</div>
          </div>
          <div class="card-arrow"><i class="fas fa-arrow-right"></i></div>
        </a>

        <!-- Card: JKM 10 -->
        <a href="jkm.html" class="gallery-card fu">
          <img src="../img/logo putih polos.png" alt="JKM 10" class="card-img contain">
          <div class="card-overlay"></div>
          <div class="card-info">
            <div class="card-title">JKM 10</div>
            <div class="card-sub">Jam'iyyah Khidmatul Ma'had</div>
          </div>
          <div class="card-arrow"><i class="fas fa-arrow-right"></i></div>
        </a>

        <!-- Tambahkan card baru di sini dengan format yang sama -->

      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="footer-brand">ZHAFEER26</div>
      <div class="footer-tagline">DuaEnamGakDendam</div>
    </footer>

  </div>

  <script>
    // ── Navbar
    const hamburger = document.getElementById('hamburger');
    const navMenu   = document.getElementById('navMenu');
    const overlay   = document.getElementById('navOverlay');

    function toggleMenu(open) {
      hamburger.classList.toggle('open', open);
      navMenu.classList.toggle('open', open);
      overlay.classList.toggle('show', open);
      document.body.style.overflow = open ? 'hidden' : '';
    }
    hamburger.addEventListener('click', () => toggleMenu(!navMenu.classList.contains('open')));
    overlay.addEventListener('click', () => toggleMenu(false));
    navMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => toggleMenu(false)));

    // ── Scroll fade-up
    const fuEls = document.querySelectorAll('.fu');
    const fuObs = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('vis'), i * 80);
          fuObs.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });
    fuEls.forEach(el => fuObs.observe(el));
  </script>
</body>
</html>
