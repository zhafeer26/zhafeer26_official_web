<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery Elegan - Navy Luxe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root{
      --neon-blue: #00f2ff;
      --deep-blue: #0f1b3d;
      --purple: #8b00ff;
      --dark-bg: #0a0e27;
      --card-bg: rgba(15, 25, 60, 0.7);
    }

    body {
      background: #0a0e17;
      color: #d1d5db;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 5vw;
    }

    header {
      text-align: center;
      padding: 100px 0 80px;
      position: relative;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, rgba(30, 58, 138, 0.18) 0%, transparent 60%);
      pointer-events: none;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(3.5rem, 8vw, 7rem);
      font-weight: 700;
      color: #60a5fa;
      background: linear-gradient(120deg, var(--neon-blue) 0%, #66f0ff 40%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
      margin-bottom: 16px;
      animation: glow 3s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 30px rgba(0, 242, 255, 0.7); }
      to { text-shadow: 0 0 90px rgba(0, 242, 255, 1), 0 0 130px rgba(139, 0, 255, 0.6); }
    }

    .subtitle {
      font-size: 1.25rem;
      color: #94a3b8;
      max-width: 700px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    .gallery {
      display: flex;
      gap: 32px;
      padding-bottom: 120px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      background: linear-gradient(145deg, #0f172a, #1e293b);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(96,165,250,0.08);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      aspect-ratio: 30 / 20 ;
      cursor: pointer;
    }

    .gallery-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(15,23,42,0.85) 80%);
      opacity: 0.4;
      transition: opacity 0.6s ease;
      z-index: 1;
    }

    .gallery-item:hover {
      transform: translateY(-18px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 2px rgba(96,165,250,0.15);
    }

    .gallery-item:hover::before {
      opacity: 0.7;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
      will-change: transform;
      background-color: #00f2ff;
    }

    .gallery-item:hover img {
      transform: scale(1.14) rotate(1.5deg);
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 40px 32px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .gallery-item:hover .content {
      opacity: 1;
      transform: translateY(0);
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 600;
      color: white;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    }

    .description {
      font-size: 1rem;
      color: #cbd5e1;
      line-height: 1.5;
      opacity: 0.9;
    }

    .accent {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c7d2fe, transparent);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .gallery-item:hover .accent {
      opacity: 0.6;
    }


    .go-back-nav {
    height: 60px;
    background: #0a0e17;
    border-bottom: 1px solid #0a0e17;
    display: flex;
    align-items: center;
    padding: 0 16px;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: white;
    font-size: 16px;
    color: rgb(183, 183, 235);
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 8px;
    transition: all 0.2s;
  }

  .back-btn:hover {
    background: #66f0ff;
    color: #0a0e17;
  }

  .back-btn:active {
    transform: translateY(1px);
  }


    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 24px;
      }
      h1 { font-size: clamp(3rem, 10vw, 5.5rem); }
      header { padding: 80px 0 60px; }
    }

    @media (max-width: 600px) {
      .gallery-item { aspect-ratio: 3 / 4; }
      .title { font-size: 1.5rem; }
    }
  </style>
</head>

  <nav class="navbar go-back-nav">
    <button class="back-btn" onclick="history.back()">
      ← Kembali
    </button>
  </nav>


<body>

  <div class="container">
    <header>
      <h1>Galeri kita</h1>
      <p class="subtitle">"Bukan tentang berapa lama kita bersama, tapi seberapa dalam kita saling mengukir." </p>
    </header>

    <div class="gallery">

      <a a href="page/zhafeer.html">
        <div class="gallery-item">
        <img src="../img/logo zhaferr.png" alt="logo-zhafeer" style=" width: 100%; height: 100%; object-fit:contain;">
        <div class="accent"></div>
        <div class="content">
          <div class="title">Zhafeer 26</div>
          <div class="description"></div>
        </div>
        </div>
      </a>  

      <a a href="page/jkm.html">
        <div class="gallery-item">
          <img src="../img/logo putih polos.png" alt="jkm" style=" width: 100%; height: 100%; object-fit:contain;">
          <div class="accent"></div>
          <div class="content">
            <div class="title" style="color: black; margin: left;">JKM 10</div>
          </div>
        </div>
      </a>
      <!-- Tambahkan item lain di sini sesuai kebutuhan -->

    </div>
  </div>

</body>
</html>
